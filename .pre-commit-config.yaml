repos:
  - repo: local
    hooks:
      - id: turbo-lint
        name: Turbo lint (CI parity)
        entry: pnpm turbo run lint
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: turbo-test
        name: Turbo test (CI parity)
        entry: pnpm turbo run test
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: turbo-build
        name: Turbo build (CI parity)
        entry: pnpm turbo run build
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: mobile-lint
        name: Mobile lint (CI parity)
        entry: pnpm --filter mobile lint
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: mobile-test
        name: Mobile test (CI parity)
        entry: pnpm --filter mobile test
        language: system
        pass_filenames: false
        stages: [pre-push]
